<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연장근로 관리자 결재 시스템 (대표님 전용)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary-color: #007bff; --danger-color: #dc3545; --success-color: #28a745; --gray-color: #f8f9fa; --dark-color: #343a40; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #222; margin-bottom: 30px; }
        
        /* 관리자 로그인 */
        .login-box { max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--dark-color); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        #admin-system { display: none; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { padding: 12px 30px; cursor: pointer; background: none; border: none; font-size: 16px; font-weight: bold; color: #666; }
        .tab-btn.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); margin-bottom: -2px; }
        
        /* 직원별 필터 옵션 영역 스타일 */
        .filter-area { margin-bottom: 15px; text-align: right; display: block; }
        .filter-select { padding: 8px 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-weight: bold; color: #333; background-color: #fff; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; }
        th { background-color: #f1f3f5; font-weight: bold; }
        
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; margin: 0 2px; }
        .btn-view { background-color: #17a2b8; color: white; }
        .btn-approve { background-color: var(--success-color); color: white; }
        .btn-reject { background-color: var(--danger-color); color: white; }
        
        /* 팝업 모달 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 25px; border-radius: 8px; width: 60%; max-width: 700px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
        .close-btn:hover { color: #000; }
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; }
        .badge-waiting { background-color: #ffc107; color: #212529; }
        .badge-approved { background-color: var(--success-color); }
        .badge-rejected { background-color: var(--danger-color); }
        
        .type-weekday { color: #333; font-weight: bold; }
        .type-weekend { color: var(--danger-color); font-weight: bold; }
    </style>
</head>
<body>

<div id="login-section" class="login-box">
    <h3>최고관리자 결재 시스템</h3>
    <p style="font-size: 12px; color: #666;">지정된 관리자 정보로 로그인하세요.</p>
    <input type="text" id="admin-name" placeholder="관리자 이름 입력" required>
    <input type="password" id="admin-pw" placeholder="관리자 비밀번호 입력" required>
    <button onclick="handleAdminLogin()">관리자 인증 접속</button>
</div>

<div id="admin-system" class="container">
    <button onclick="handleAdminLogout()" style="float: right; padding: 6px 12px; background: #e2e8f0; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; color: #4a5568;">로그아웃</button>

    <h2>👑 연장근로 결재/관리 센터 (실시간 구글 DB 연동)</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('대기', this)">결재 대기 목록</button>
        <button class="tab-btn" onclick="switchTab('승인', this)">승인 완료 내역</button>
        <button class="tab-btn" onclick="switchTab('반송', this)">반송 처리 내역</button>
    </div>

    <div id="filter-wrapper" class="filter-area">
        <label for="employee-filter" style="font-weight: bold; margin-right: 8px; font-size: 14px;">조회 옵션:</label>
        <select id="employee-filter" class="filter-select" onchange="filterByEmployee()">
            <option value="all">전체 직원 보기 (제출일시 순)</option>
        </select>
    </div>

    <div id="list-container">
        <table>
            <thead>
                <tr>
                    <th width="20%">제출 일시</th>
                    <th width="15%">신청자 (사원)</th>
                    <th width="15%">연락처 뒷자리</th>
                    <th width="15%">총 신청 시간</th>
                    <th width="12%">상태</th>
                    <th width="23%">결재 관리</th>
                </tr>
            </thead>
            <tbody id="admin-tbody">
                <tr><td colspan="6">로그인 후 내역이 조회됩니다.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modal-title" style="margin-top: 0;">연장근로 상세 내역 확인</h3>
        <hr>
        <table style="margin-top: 15px;">
            <thead>
                <tr>
                    <th>근무 일자</th>
                    <th>근무 형태</th>
                    <th>시작 시간</th>
                    <th>종료 시간</th>
                    <th>인정 시간</th>
                </tr>
            </thead>
            <tbody id="modal-tbody"></tbody>
        </table>
        <div id="modal-reason-area" style="margin-top: 15px; display: none; background: #fff3cd; padding: 10px; border-radius: 4px; border: 1px solid #ffeeba;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpMIytCpZ5F5JRoKABJE7kkgv_RZReFRc",
        authDomain: "hansin-df749.firebaseapp.com",
        projectId: "hansin-df749",
        storageBucket: "hansin-df749.firebasestorage.app",
        messagingSenderId: "908820835514",
        appId: "1:908820835514:web:0e02c604c7cf775d5f2683",
        measurementId: "G-LP10H2WN94"
    };

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentTabStatus = "대기"; 
    let originalFetchedDocs = []; // 필터링을 위한 원본 데이터 보관함

    const ADMIN_ACCOUNT = {
        name: "김은지", 
        pw: "1234"      
    };

    // [기능 추가] 새로고침 했을 때 로그인 정보 유지시키는 자동 통과 장치!
    window.addEventListener('DOMContentLoaded', () => {
        if (sessionStorage.getItem('boss_authenticated') === 'true') {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-system').style.display = 'block';
            loadAdminData();
        }
    });

    function handleAdminLogin() {
        const name = document.getElementById('admin-name').value.trim();
        const pw = document.getElementById('admin-pw').value.trim();

        if (name === ADMIN_ACCOUNT.name && pw === ADMIN_ACCOUNT.pw) {
            sessionStorage.setItem('boss_authenticated', 'true'); // 세션 금고에 안튕기게 기억!
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-system').style.display = 'block';
            loadAdminData();
        } else {
            alert("🔒 관리자 정보가 일치하지 않습니다. 접근 권한이 없습니다.");
        }
    }

    // 로그아웃 시스템
    function handleAdminLogout() {
        if (confirm("로그아웃 하시겠습니까?")) {
            sessionStorage.removeItem('boss_authenticated');
            location.reload();
        }
    }

    function switchTab(status, element) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        currentTabStatus = status;

        // 결재 대기 목록 탭일 때만 직원별 필터 옵션창을 띄워줍니다.
        const filterWrapper = document.getElementById('filter-wrapper');
        if (status === '대기') {
            filterWrapper.style.display = 'block';
        } else {
            filterWrapper.style.display = 'none';
        }

        loadAdminData();
    }

    function loadAdminData() {
        const tbody = document.getElementById('admin-tbody');
        tbody.innerHTML = `<tr><td colspan="6">구글 DB에서 [${currentTabStatus}] 내역을 조회 중입니다...</td></tr>`;

        db.collection("overtime_requests")
          .where("status", "==", currentTabStatus)
          .orderBy("submittedAt", "desc")
          .get()
          .then((querySnapshot) => {
              if (querySnapshot.empty) {
                  tbody.innerHTML = `<tr><td colspan="6">조회된 [${currentTabStatus}] 내역이 존재하지 않습니다.</td></tr>`;
                  return;
              }

              originalFetchedDocs = [];
              querySnapshot.forEach(doc => originalFetchedDocs.push({ id: doc.id, ...doc.data() }));

              // 결재 대기 탭인 경우 필터 선택창에 들어갈 직원 명단을 동적으로 싹 세팅해줍니다.
              if (currentTabStatus === '대기') {
                  updateEmployeeFilterOptions();
              }

              renderTableData(originalFetchedDocs);
          })
          .catch(err => {
              if (err.message && err.message.includes("index")) {
                  tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align:left; padding:20px; background:#fff0f0; color:#c00;">
                            <strong>⚠️ 구글 정렬 승인이 필요합니다. (최초 1회 필수)</strong><br><br>
                            데이터 조회를 위한 정렬 링크가 아래에 생성되었습니다. 버튼을 눌러 승인해 주세요.<br><br>
                            <button class="btn btn-reject" onclick="window.open('https://console.firebase.google.com/v1/r/project/${firebaseConfig.projectId}/firestore/indexes?create_composite=ClVwcm9qZWN0cy9oYW5zaW4tZGY3NDkvZGF0YWJhc2VzLyhkZWZhdWx0KS9jb2xsZWN0aW9uR3JvdXBzL292ZXJ0aW1lX3JlcXVlc3RzL2luZGV4ZXMvXwEBFgoKc3RhdHVzEAIKD3N1Ym1pdHRlZEF0EAIb', '_blank')" style="padding:10px 20px; font-size:14px;">
                                👉 여기를 눌러 구글 인덱스 자동 생성하기
                            </button>
                        </td>
                    </tr>`;
              } else {
                  tbody.innerHTML = `<tr><td colspan="6" style="color:var(--danger-color);">오류 발생: ${err.message}</td></tr>`;
              }
          });
    }

    // [기능 추가] 들어온 서류 더미에서 직원 이름을 중복 없이 묶어 선택창에 채워넣기
    function updateEmployeeFilterOptions() {
        const filterSelect = document.getElementById('employee-filter');
        const currentSelected = filterSelect.value; // 현재 선택된 값 임시 유지용
        
        filterSelect.innerHTML = '<option value="all">전체 직원 보기 (제출일시 순)</option>';
        
        const names = [...new Set(originalFetchedDocs.map(doc => doc.employeeName))];
        names.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.innerText = `👤 ${name} 사원만 보기`;
            filterSelect.appendChild(opt);
        });

        // 만약 선택되어 있던 직원이 존재했다면 풀리지 않게 고정
        if(names.includes(currentSelected)) {
            filterSelect.value = currentSelected;
        }
    }

    // [기능 추가] 선택한 직원에 맞춰 실시간 화면 데이터 필터링 조작
    function filterByEmployee() {
        const selectedValue = document.getElementById('employee-filter').value;
        if (selectedValue === 'all') {
            renderTableData(originalFetchedDocs);
        } else {
            const filtered = originalFetchedDocs.filter(doc => doc.employeeName === selectedValue);
            renderTableData(filtered);
        }
    }

    // 실제 테이블에 데이터를 뿌려주는 렌더링 함수 (삭제 버튼 삭제 완료)
    function renderTableData(dataArray) {
        const tbody = document.getElementById('admin-tbody');
        if (dataArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6">조회된 내역이 존재하지 않습니다.</td></tr>`;
            return;
        }

        let html = "";
        dataArray.forEach((data) => {
            const submitDate = data.submittedAt ? data.submittedAt.toDate().toLocaleString() : "방금 전";
            const phoneTail = data.employeePhone ? data.employeePhone.slice(-4) : "----";
            
            let badgeHtml = `<span class="badge badge-waiting">대기</span>`;
            if(data.status === "승인") badgeHtml = `<span class="badge badge-approved">승인완료</span>`;
            if(data.status === "반송") badgeHtml = `<span class="badge badge-rejected">반송됨</span>`;

            let actionButtons = `<button class="btn btn-view" onclick="viewDetails('${data.id}')">상세보기</button>`;
            if (data.status === "대기") {
                actionButtons += `
                    <button class="btn btn-approve" onclick="approveRequest('${data.id}')">승인</button>
                    <button class="btn btn-reject" onclick="rejectRequest('${data.id}')">반송</button>
                `;
            }

            html += `
                <tr>
                    <td>${submitDate}</td>
                    <td><strong>${data.employeeName}</strong></td>
                    <td>${phoneTail}</td>
                    <td><span style="color:var(--primary-color); font-weight:bold;">${data.totalHours} 시간</span></td>
                    <td>${badgeHtml}</td>
                    <td>${actionButtons}</td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
    }

    function viewDetails(docId) {
        db.collection("overtime_requests").doc(docId).get().then((doc) => {
            if(!doc.exists) return;
            const data = doc.data();
            
            document.getElementById('modal-title').innerText = `📊 ${data.employeeName} 사원의 신청 상세 내역`;
            
            let tbodyHtml = "";
            data.detailLogs.forEach(log => {
                const typeStyle = log.type === 'weekend' ? 'type-weekend' : 'type-weekday';
                const typeText = log.type === 'weekend' ? '주말/공휴일' : '평일야근';
                tbodyHtml += `
                    <tr>
                        <td>${log.date}</td>
                        <td><span class="${typeStyle}">${typeText}</span></td>
                        <td>${log.start}</td>
                        <td>${log.end}</td>
                        <td><strong>${log.hours}</strong> 시간</td>
                    </tr>
                `;
            });
            document.getElementById('modal-tbody').innerHTML = tbodyHtml;
            
            const reasonArea = document.getElementById('modal-reason-area');
            if(data.status === '반송' && data.rejectReason) {
                reasonArea.style.display = "block";
                reasonArea.innerHTML = `<strong>⚠️ 기존 반송 사유:</strong> ${data.rejectReason}`;
            } else {
                reasonArea.style.display = "none";
            }

            document.getElementById('detail-modal').style.display = "block";
        });
    }

    function closeModal() { document.getElementById('detail-modal').style.display = "none"; }

    function approveRequest(docId) {
        if(!confirm("이 연장근로 내역을 최종 [승인] 처리하시겠습니까?")) return;
        db.collection("overtime_requests").doc(docId).update({
            status: "승인",
            approvedAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => { alert("🎉 성공적으로 승인 처리되었습니다."); loadAdminData(); })
        .catch(err => alert("승인 실패: " + err.message));
    }

    function rejectRequest(docId) {
        const reason = prompt("사원에게 전달할 [반송 사유]를 입력해 주세요:");
        if (reason === null) return; 
        if (reason.trim() === "") { alert("사유를 반드시 입력해야 반송이 가능합니다."); return; }

        db.collection("overtime_requests").doc(docId).update({
            status: "반송",
            rejectReason: reason,
            rejectedAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => { alert("⚠️ 해당 문서가 반송 처리되었습니다."); loadAdminData(); })
        .catch(err => alert("반송 실패: " + err.message));
    }

    window.onclick = function(event) {
        const modal = document.getElementById('detail-modal');
        if (event.target == modal) { modal.style.display = "none"; }
    }
</script>
</body>
</html>
