<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사원 등록 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-box">
        <h3>새로운 사원 등록</h3>
        <p style="font-size: 12px; color: #666;">시스템에 등록할 사원 정보를 입력하세요.</p>
        <input type="text" id="reg-name" placeholder="이름 입력">
        <input type="text" id="reg-phone" placeholder="휴대폰 번호 입력">
        <button onclick="alert('등록 기능 구현 예정 영역입니다.')">사원 등록하기</button>
        <br><br>
        <a href="index.html" style="font-size: 13px; color: var(--primary-color); text-decoration: none;">메인 로그인 페이지로 가기</a>
    </div>
</body>
</html>
